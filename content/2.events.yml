faq:
  title: Pertanyaan yang Sering Diajukan
  description: Semua yang perlu Anda ketahui tentang event kami.
  items:
    - label: Apakah event ini gratis?
      content: Sebagian besar event kami gratis untuk anggota NLFTs Developer Program.
    - label: Bagaimana cara mendaftar?
      content: Anda cukup mengklik link pada masing-masing kartu event di atas.
    - label: Apakah ada rekaman event online?
      content: Ya, semua rekaman webinar akan tersedia di Developer Hub setelah event selesai.