title: Dokumentasi [NLFTs]{class="text-primary"} Developer Program
description: Panduan komprehensif untuk mengintegrasikan layanan, API, dan komponen antarmuka NLFTs. Dibangun oleh dan untuk developer.
seo:
  title: NLFTs Developer Program
  description: Pelajari cara membangun aplikasi generasi berikutnya dengan ekosistem alat, pustaka, dan API canggih dari NLFTs.
navigation: false
hero:
  links:
    - label: Mulai Membaca Docs
      icon: i-lucide-arrow-right
      trailing: true
      to: /docs/getting-started
      size: xl
    - label: Repositori GitHub
      icon: i-simple-icons-github
      size: xl
      color: neutral
      variant: subtle
      to: https://github.com/NLFTs
      target: _blank
sections:
  - title: Didukung oleh Teknologi Modern
    description: Akses pustaka komponen yang dioptimalkan dan referensi API terlengkap. Semua yang Anda butuhkan untuk mengembangkan produk yang efisien, skalabel, dan tangguh.
    id: features
    orientation: horizontal
    features:
      - name: Komponen Tingkat Lanjut
        description: Menggabungkan keandalan dan estetika. Komponen kami dirancang untuk responsivitas tinggi dan aksesibilitas maksimal.
        icon: i-lucide-package
      - name: Autentikasi & Keamanan
        description: Integrasi autentikasi yang mulus untuk menjaga integritas data tanpa mengorbankan pengalaman pengguna.
        icon: i-lucide-shield
      - name: Siap TypeScript
        description: Dukungan penuh TypeScript memberikan tipe aman yang membantu meminimalkan bug sejak tahap penulisan kode.
        icon: i-lucide-code-2
  - title: Dibangun untuk Masa Depan
    description: Kami memahami bahwa standar terus berkembang. NLFTs menghadirkan solusi yang dirancang agar tetap relevan dan beradaptasi dengan inovasi masa depan.
    orientation: horizontal
    reverse: true
    features:
      - name: Performa Optimal
        description: Dioptimalkan dengan caching canggih dan asinkronisasi proses untuk respons data yang nyaris instan.
        icon: i-lucide-zap
      - name: Adaptif & Fleksibel
        description: Mendukung skema desain dinamis, transisi mulus, dan preferensi tema lokal seperti dark mode.
        icon: i-lucide-moon
      - name: Aksesibilitas Global
        description: Infrastruktur disiapkan untuk lalu lintas skala global dengan lokalisasi (i18n) terintegrasi secara bawaan.
        icon: i-lucide-globe
features:
  title: Fondasi Ekosistem Anda
  description: Tinggalkan kode boilerplate. Fokus pada logika bisnis Anda sementara NLFTs menyediakan abstraksi, utilitas, dan dokumentasi mendalam.
  items:
    - title: Desain Sistem Konsisten
      description: Variabel terpusat, tipografi bersih, dan palet warna yang harmonis untuk memberikan kesan premium.
      icon: i-lucide-palette
    - title: Panduan Langkah-demi-Langkah
      description: Dokumentasi yang kaya akan contoh kasus nyata yang akan mempercepat kurva pembelajaran tim Anda.
      icon: i-lucide-book-open
    - title: Pengalaman Developer
      description: Hot-reloading, auto-imports, dan perkakas bawaan membuat rutinitas harian Anda menjadi lebih minim gesekan.
      icon: i-lucide-terminal
    - title: SEO Ramah Mesin Pencari
      description: Rendering statis maupun sisi server (SSR) yang telah disetel untuk visibilitas maksimal.
      icon: i-lucide-search
    - title: Stabilitas Terjamin
      description: Melewati berbagai pengujian ketat sebelum mencapai tahap produksi. Aman dari kerentanan umum.
      icon: i-lucide-check-circle
    - title: Arsitektur Ekstensibel
      description: Bebas menentukan arsitektur. Gunakan hanya modul yang Anda perlukan dan abaikan sisanya.
      icon: i-lucide-settings
testimonials:
  headline: Testimoni Developer
  title: Membantu Ratusan Tim Bergerak Cepat
  description: Lihat bagaimana integrasi dengan sistem NLFTs telah membantu para developer dari berbagai tingkat keahlian.
  items:
    - quote: Ekosistem NLFTs benar-benar mengagumkan. Struktur API-nya logis dan kami dapat menyingkat waktu produksi prototipe secara signifikan tanpa menurunkan kualitas antarmuka.
      user:
        name: Budi Prakoso
        description: Lead Frontend Engineer
        avatar:
          src: https://i.pravatar.cc/120?img=11
    - quote: Saya menemukan banyak dokumentasi yang tidak jelas di luar sana, namun NLFTs menyediakan panduan teknis yang presisi. Integrasi selesai dalam hitungan jam.
      user:
        name: Siti Nurhaliza
        description: Fullstack Developer
        avatar:
          src: https://i.pravatar.cc/120?img=5
    - quote: Dengan komponen yang telah mendukung aksesibilitas dan performa kelas atas, tim kami lebih fokus merancang alur bisnis ketimbang memperbaiki bug styling.
      user:
        name: Andi Wijaya
        description: Software Architect
        avatar:
          src: https://i.pravatar.cc/120?img=8
    - quote: Sebagai developer independen, saya sangat tertolong oleh utilitas yang ditawarkan. Komunitasnya juga aktif dan selalu ada saat saya menemui jalan buntu.
      user:
        name: Rina Melati
        description: Indie Hacker
        avatar:
          src: https://i.pravatar.cc/120?img=9
cta:
  title: Siap Membangun dengan NLFTs?
  description: Jangan mulai dari nol. Pelajari dokumentasi kami, unduh paketnya, dan bergabunglah dengan revolusi pengembangan web.
  links:
    - label: Baca Dokumentasi
      to: /docs/getting-started
      trailingIcon: i-lucide-arrow-right
    - label: Kunjungi Repositori
      to: https://github.com/NLFTs
      variant: subtle
      icon: i-simple-icons-github
